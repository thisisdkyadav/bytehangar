services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bytehangar
      POSTGRES_PASSWORD: bytehangar
      POSTGRES_DB: bytehangar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytehangar"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible backend for local dev (the "s3" driver points here)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bytehangar
      MINIO_ROOT_PASSWORD: bytehangar-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
